<!DOCTYPE html>
<html>
<head>
<title>Farewell Message</title>

<style>

body{
    background-color:#f6efe6; /* warm cream background */
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Fade-in animation */
@keyframes fadeInCard{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.card{
    background:#3b2f2f; /* warm cocoa brown */
    padding:40px;
    border-radius:18px;
    width:420px;
    text-align:center;
    box-shadow:0px 10px 30px rgba(0,0,0,0.2);
    animation:fadeInCard 1.2s ease;
}

.photo{
    width:200px;
    height:240px; /* 1 : 1.2 ratio */
    border-radius:20px;
    object-fit:cover;
    border:4px solid #e6d5c3; /* soft beige border */
}

.name{
    font-size:28px;
    margin-top:18px;
    color:#f5ede3; /* soft cream text */
    font-weight:bold;
}

.message{
    margin-top:18px;
    font-size:16px;
    line-height:1.6;
    color:#e2d3c0; /* warm light text */
}

</style>

</head>

<body>

<div class="card">

<img src="studentphoto.jpg" class="photo">

<div class="name">Student Name</div>

<div class="message">
Thank you for the memories, the laughs, and the moments that made school unforgettable.
Wishing you all the best for the amazing journey ahead!
</div>

</div>

</body>
</html>
