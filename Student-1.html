<!DOCTYPE html>
<html>
<head>
<title>Farewell Message</title>

<style>

body{
    background-color:#0b0b0b;
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#f5e6d3; /* beige aesthetic */
    padding:40px;
    border-radius:18px;
    width:420px;
    text-align:center;
    box-shadow:0px 0px 20px rgba(0,0,0,0.4);
}

.photo{
    width:240px;       /* 1.2 : 1 ratio */
    height:200px;
    border-radius:20px; /* curved edges */
    object-fit:cover;
    border:4px solid black;
}

.name{
    font-size:28px;
    margin-top:18px;
    color:#2b2b2b; /* darker text */
    font-weight:bold;
}

.message{
    margin-top:18px;
    font-size:16px;
    line-height:1.6;
    color:#3a3a3a; /* darker text */
}

</style>

</head>

<body>

<div class="card">

<img src="studentphoto.jpg" class="photo">

<div class="name">Student Name</div>

<div class="message">
Thank you for the memories, the laughs, and the moments that made school unforgettable.
Wishing you all the best for the amazing journey ahead!
</div>

</div>

</body>
</html>
