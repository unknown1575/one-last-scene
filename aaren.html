<!DOCTYPE html>
<html>
<head>
<title>Farewell Message</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    background-color:#efe6d8;
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    padding:20px;
}

@keyframes fadeInCard{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.card{
    background:#3b302a;
    padding:50px 40px;
    border-radius:18px;
    width:90%;
    max-width:420px;
    text-align:center;
    box-shadow:0px 10px 30px rgba(0,0,0,0.2);
    animation:fadeInCard 1.2s ease;
}

/* QUOTE STYLE - MADE BIGGER & MAIN FOCUS */
.quote{
    font-family:'Cinzel', serif;
    font-size:28px;
    margin-top:0;
    margin-bottom:25px;
    color:#f5f0e8;
    font-style:italic;
    line-height:1.4;
}

/* MESSAGE STYLE */
.message{
    font-family:'Cormorant Garamond', serif;
    font-size:18px;
    line-height:1.7;
    color:#e2d5c6;
}

</style>
</head>

<body>

<div class="card">

<div class="quote">
"Every great story deserves a memorable final scene."
</div>

<div class="message">
Aaren Jizanto J, join us for an evening dedicated to celebrating your journey and the legacy you leave behind.
</div>

</div>

</body>
</html>
