<!DOCTYPE html>
<html>

<head>
<title>One Last Scene</title>

<style>

body{
background-image: url('subtle-leaves-gold-color-frame-hd-wallpaper-background_1000823-11358.avif');
background-size: cover;
background-position: center;
background-repeat: no-repeat;
background-attachment: fixed;

font-family: Arial;
text-align: center;
color: gold;

margin: 0;
min-height: 100vh;
}

.container{
background: rgba(0,0,0,0.65);
padding:40px;
border-radius:12px;
width:60%;
margin:auto;
margin-top:80px;
}

table{
margin:auto;
width:80%;
border-collapse: collapse;
}

td{
padding:12px;
border-bottom:1px solid gold;
}

a{
color:white;
text-decoration:none;
font-weight:bold;
}

a:hover{
color:gold;
}

</style>

</head>

<body>

<div class="container">

<h1>🎬 ONE LAST SCENE</h1>
<h3>Final Roll Call – Class XII</h3>

<p>
Before the final scene begins, mark your presence and
click your name to read your message.
</p>

<table>

<tr>
<td><input type="checkbox" id="cb1" onchange="saveCheck(this)"></td>
<td><a href="student1.html">Student Name 1</a></td>
</tr>

<tr>
<td><input type="checkbox" id="cb2" onchange="saveCheck(this)"></td>
<td><a href="student2.html">Student Name 2</a></td>
</tr>

<tr>
<td><input type="checkbox" id="cb3" onchange="saveCheck(this)"></td>
<td><a href="student3.html">Student Name 3</a></td>
</tr>

<tr>
<td><input type="checkbox" id="cb4" onchange="saveCheck(this)"></td>
<td><a href="student4.html">Student Name 4</a></td>
</tr>

<tr>
<td><input type="checkbox" id="cb5" onchange="saveCheck(this)"></td>
<td><a href="student5.html">Student Name 5</a></td>
</tr>

</table>

</div>

<script>

function saveCheck(box){
localStorage.setItem(box.id, box.checked);
}

window.onload = function(){

let boxes = document.querySelectorAll("input[type=checkbox]");

boxes.forEach(function(box){
let stored = localStorage.getItem(box.id);
if(stored === "true"){
box.checked = true;
}
});

}

</script>

</body>
</html>
