<!DOCTYPE html>
<html>

<head>

<title>One Last Scene</title>

<!-- MOBILE VIEWPORT ADDED -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Cormorant+Garamond:wght@400;500&family=Quicksand:wght@500&display=swap" rel="stylesheet">

<style>

body{
background:#0b0b0b;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
color:#f2efe9;
padding:20px; /* ADDED FOR PHONE SPACING */
}

/* TITLE AREA */

.header-card{
background:#111;
width:90%; /* CHANGED FROM 650px */
max-width:850px; /* ADDED */
padding:30px;
margin-top:50px;
border-radius:20px;
text-align:center;
border:1px solid #c8a46a;
box-sizing:border-box;
}

/* MAIN TITLE */

h1{
font-family:'Cinzel', serif;
font-size:44px;
margin:0;
color:#f5d38a;
letter-spacing:2px;
}

/* SUBTITLE */

h3{
font-family:'Cormorant Garamond', serif;
font-size:24px;
margin-top:8px;
color:#e3c17c;
}

/* DESCRIPTION */

.desc{
font-family:'Cormorant Garamond', serif;
font-size:18px;
margin-top:10px;
color:#f2efe9;
opacity:0;
animation:fadeText 2s forwards;
}

@keyframes fadeText{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* CHECKLIST BOX */

.checklist{
background:#111;
width:90%; /* CHANGED FROM 650px */
max-width:850px; /* ADDED */
margin-top:35px;
padding:40px;
border-radius:30px;
border:1px solid #c8a46a;
box-sizing:border-box;
}

/* EACH ROW */

.row{
display:flex;
align-items:center;
border-bottom:1px dashed #c8a46a;
padding:10px 0;
}

/* CHECKBOX */

.row input{
width:20px;
height:20px;
margin-right:15px;
accent-color:#c8a46a;
}

/* STUDENT NAME */

.row a{
font-family:'Quicksand', sans-serif;
font-size:18px;
text-decoration:none;
color:#f2efe9;
transition:0.3s;
}

.row a:hover{
color:#f5d38a;
}

</style>

</head>

<body>

<div class="header-card">

<h1>🎬 ONE LAST SCENE</h1>

<h3>Final Roll Call – Class XII</h3>

<p class="desc">
Before the final scene rolls, mark your presence and step into your moment.
Click your name to read your message.
</p>

</div>

<div class="checklist">

<div class="row">
<input type="checkbox" id="s1">
<a href="Student-1.html">Student Name 1</a>
</div>

<div class="row">
<input type="checkbox" id="s2">
<a href="student2.html">Student Name 2</a>
</div>

<div class="row">
<input type="checkbox" id="s3">
<a href="student3.html">Student Name 3</a>
</div>

<div class="row">
<input type="checkbox" id="s4">
<a href="student4.html">Student Name 4</a>
</div>

<div class="row">
<input type="checkbox" id="s5">
<a href="student5.html">Student Name 5</a>
</div>

</div>

<script>

/* SAVE CHECKBOX STATES */

let boxes = document.querySelectorAll("input[type=checkbox]");

boxes.forEach(box => {

let saved = localStorage.getItem(box.id);

if(saved === "true"){
box.checked = true;
}

box.addEventListener("change", () => {
localStorage.setItem(box.id, box.checked);
});

});

</script>

</body>
</html>
